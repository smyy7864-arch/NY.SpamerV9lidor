<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת אבטחה - גישה מוגבלת</title>
    <style>
        /* עיצוב הרקע והדף */
        body {
            margin: 0;
            padding: 0;
            background-color: black;
            color: #0f0; /* ירוק זרחני */
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden; /* מונע גלילה כדי שהמטריקס יכסה הכל */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* קנבס לרקע המטריקס */
        #matrix {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        /* תיבת הטקסט במרכז */
        .terminal {
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border: 2px solid #0f0;
            box-shadow: 0 0 15px #0f0;
            text-align: center;
            max-width: 80%;
        }

        .status-text {
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }

        .discord-link {
            display: inline-block;
            margin-top: 20px;
            color: black;
            background: #0f0;
            padding: 10px 20px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
        }

        .discord-link:hover {
            background: #008000;
            color: white;
        }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <div class="terminal">
        <h1>מערכת אבטחה פעילה</h1>
        <p class="status-text">...סורק רשתות...</p>
        <p>גישה למורשים בלבד</p>
        <a href="https://discord.gg/YOUR-LINK" class="discord-link">הצטרף לדיסקורד שלנו</a>
    </div>

    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');

        // התאמת הקנבס לגודל המסך
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // תווים שיופיעו ברקע (אפשר להוסיף אותיות, מספרים או תווים מוזרים)
        const characters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$#@%&*^";
        const fontSize = 16;
        const columns = canvas.width / fontSize;

        // מערך שיחזיק את המיקום של כל "טיפה"
        const drops = [];
        for (let i = 0; i < columns; i++) {
            drops[i] = 1;
        }

        function draw() {
            // שכבה שחורה שקופה כדי ליצור את אפקט הטשטוש (Fade)
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#0f0"; // צבע האותיות
            ctx.font = fontSize + "px arial";

            for (let i = 0; i < drops.length; i++) {
                const text = characters.charAt(Math.floor(Math.random() * characters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                // החזרת הטיפה למעלה באקראי אחרי שהיא עוברת את סוף המסך
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        setInterval(draw, 33); // מהירות הריצה (33 מילישניות)
    </script>
</body>
</html>
